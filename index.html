<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQI Signage - Focus Large Data</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #F3F3F3; overflow: hidden; 
        }
        
        /* แถบสีพื้นหลัง 65% */
        #bottom-bar { 
            width: 100%; height: 65%; position: absolute; 
            bottom: 0; left: 0; background: #95a5a6; 
            transition: background 1s ease-in-out; z-index: 1;
        }

        .screen-container { 
            width: 100%; height: 100vh; display: flex; 
            flex-direction: column; justify-content: space-between; 
            align-items: center; position: relative; z-index: 10;
        }

        /* 1. Header: ขนาดเดิม (8vh) */
        .header-section {
            height: 18vh; display: flex; align-items: center; justify-content: center;
        }
        .header-text { font-size: 8vh; font-weight: 700; color: #000000; }

        /* 2. Main Card: ขยายพื้นที่ภายในเพื่อรองรับตัวเลขยักษ์ */
        .main-section {
            height: 52vh; width: 100%; display: flex; align-items: center; justify-content: center;
        }
        .main-card { 
            width: 96%; max-width: 1700px; height: 100%;
            background: #ffffff; box-shadow: 0 40px 120px rgba(0,0,0,0.25); 
            border-radius: 80px; display: flex; 
            align-items: center; justify-content: center; padding: 0 2%;
        }

        /* ขยาย Icon ให้ใหญ่พิเศษ */
        .status-icon { 
            font-size: 34vh; 
            margin-right: 4%;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.15));
        }

        .aqi-info { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* ขยายตัวเลขให้ใหญ่ที่สุด (38vh) */
        #aqi-value { 
            font-size: 38vh; 
            font-weight: 700; line-height: 0.8; color: #95a5a6;
            margin: 0; letter-spacing: -10px;
        }

        .aqi-unit { 
            font-size: 5vh; font-weight: 700; color: #95a5a6;
            margin-top: 1vh; opacity: 0.7;
        }

        /* 3. Footer: ขนาดเดิม (11vh) */
        .footer-section {
            height: 30vh; width: 100%; display: flex; 
            flex-direction: column; align-items: center; 
            justify-content: flex-start; padding-top: 4vh;
        }

        #status-text { 
            color: #ffffff; font-size: 11vh; font-weight: 700; 
            text-shadow: 0 6px 20px rgba(0,0,0,0.3); margin-bottom: 2vh;
        }

        .meta-info { color: rgba(255,255,255,0.9); font-size: 3.5vh; font-weight: 500; }
    </style>
</head>
<body>

    <div id="bottom-bar"></div>

    <div class="screen-container">
        <div class="header-section">
            <div class="header-text">ดัชนีคุณภาพอากาศวันนี้</div>
        </div>
        
        <div class="main-section">
            <div class="main-card">
                <div id="status-icon" class="status-icon">⏳</div>
                <div class="aqi-info">
                    <div id="aqi-value">--</div>
                    <div id="aqi-unit-text" class="aqi-unit">US-AQI</div>
                </div>
            </div>
        </div>

        <div class="footer-section">
            <div id="status-text">อัปเดตข้อมูล...</div>
            <div class="meta-info">
                <span>Chiang Mai University</span> | <span id="current-time">00:00:00</span>
            </div>
        </div>
    </div>

    <script>
        var TOKEN = '7b1855999d1e30206e4beffd05616884b1f3e716';
        var STATIONS = ['@99490', '@365722', 'chiangmai'];

        function updateClock() {
            var now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleTimeString('th-TH');
        }

        function fetchAirData() {
            var requestData = function(index) {
                if (index >= STATIONS.length) return;
                var xhr = new XMLHttpRequest();
                xhr.open('GET', 'https://api.waqi.info/feed/' + STATIONS[index] + '/?token=' + TOKEN + '&_ts=' + new Date().getTime(), true);
                xhr.onreadystatechange = function() {
                    if (xhr.readyState == 4 && xhr.status == 200) {
                        var result = JSON.parse(xhr.responseText);
                        if (result.status === 'ok' && result.data && result.data.aqi > 0) {
                            updateUI(result.data.aqi);
                        } else {
                            requestData(index + 1);
                        }
                    }
                };
                xhr.send();
            };
            requestData(0);
        }

        function updateUI(aqi) {
            var val = Math.round(aqi);
            var color = "#7f8c8d", text = "อันตราย!", icon = "💀";

            if (val <= 50) { color = "#2ecc71"; text = "คุณภาพอากาศดี"; icon = "😊"; }
            else if (val <= 100) { color = "#f1c40f"; text = "อากาศปานกลาง"; icon = "🙂"; }
            else if (val <= 150) { color = "#EA7D1F"; text = "เริ่มมีผลต่อสุขภาพ"; icon = "😟"; }
            else if (val <= 200) { color = "#e74c3c"; text = "มีผลต่อสุขภาพ"; icon = "😫"; }
            else if (val <= 300) { color = "#9b59b6"; text = "มีผลต่อสุขภาพมาก"; icon = "🤢"; }

            document.getElementById('aqi-value').innerText = val;
            document.getElementById('aqi-value').style.color = color;
            document.getElementById('aqi-unit-text').style.color = color;
            document.getElementById('bottom-bar').style.background = color;
            document.getElementById('status-text').innerText = text;
            document.getElementById('status-icon').innerText = icon;
        }

        setInterval(updateClock, 1000);
        updateClock();
        fetchAirData();
        setInterval(fetchAirData, 600000);
    </script>
</body>
</html>
